name: Warehouse Capacity Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # ~6 hours
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run monitor
      env:
        WAREHOUSE_ID: ${{ vars.WAREHOUSE_ID }}
        SELLER_API_ACCESS_TOKEN: ${{ secrets.SELLER_API_ACCESS_TOKEN }}
        TRACKER_GLOB_NEW: ${{ secrets.TRACKER_GLOB_NEW }}
        TRACKER_SESSION: ${{ secrets.TRACKER_SESSION }}
        TS01DDD49F: ${{ secrets.TS01DDD49F }}
        TS018D011A: ${{ secrets.TS018D011A }}
        VARIANTS: ${{ secrets.VARIANTS }}
        COUNTS: ${{ secrets.COUNTS }}
        SMS_API_KEY: ${{ secrets.SMS_API_KEY }}
        SMS_RECIPIENT: ${{ secrets.SMS_RECIPIENT }}
      run: |
        python -u monitor.py