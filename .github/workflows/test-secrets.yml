name: Test Secrets

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check if secrets exist
        env:
          WAREHOUSE_ID: ${{ secrets.WAREHOUSE_ID }}
          SELLER_TOKEN: ${{ secrets.SELLER_API_ACCESS_TOKEN }}
          VARIANTS: ${{ secrets.VARIANTS }}
        run: |
          echo "WAREHOUSE_ID length: ${#WAREHOUSE_ID}"
          echo "SELLER_TOKEN length: ${#SELLER_TOKEN}"
          echo "VARIANTS length: ${#VARIANTS}"
          echo "All secrets are properly set!"